spring:
  application:
    name: stockflow-api

# --- Base de datos MySQL ---
  datasource:
    url: mysql://localhost:3306/stockflow_db?createDatabaseIfNotExist=true&serverTimeZone=UTC
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver

# --- Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

